name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish D365CommandCenter.csproj -c Release -o release --nologo

      - name: Rewrite base href for project pages
        run: sed -i 's|<base href="/" />|<base href="/d365-erp-command-center/" />|g' release/wwwroot/index.html

      - name: SPA fallback (deep links)
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Disable Jekyll (Blazor _framework)
        run: touch release/wwwroot/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
